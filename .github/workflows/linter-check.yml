name: Linter Check

on:
  - push: 
      branches: [ master ]
  - pull_request:
      branches: [ master ]

jobs:
  linter_check:
    runs-on: macos-latest
    steps: 
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 13
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - name: Run linter
      - run: make lint